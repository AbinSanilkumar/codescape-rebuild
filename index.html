                <div class="contact-form-section">
                    <h2 class="section-title">Get a Quote</h2>
                    <p class="section-description">Tell us about your project and we'll get back to you within 24 hours.</p>
                    
                    <form class="contact-form" id="contact-form">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="project">Project Details</label>
                            <textarea id="project" name="project" rows="4" placeholder="Describe your project..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-large">Send Quote Request</button>
                    </form>
                </div>
